<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVERAGE CALCULATOR</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="theme-toggle">
        <button id="themeBtn" onclick="toggleTheme()">
            <span id="themeIcon">☀</span>
        </button>
    </div>

    <header>
        <h1>AVERAGE CALCULATOR</h1>
        <p class="subtitle">Calculez votre moyenne ponderee en toute simplicite</p>
    </header>

    <main class="container">
        <div class="input-section">
            <div class="input-group">
                <label for="nbMatieres">Nombre de matieres</label>
                <input type="number" id="nbMatieres" min="1" placeholder="Ex: 5" onchange="genererLignes()">
            </div>
        </div>

        <div class="table-container">
            <table id="tableMoyenne">
                <thead>
                    <tr>
                        <th>N</th>
                        <th>Notes</th>
                        <th>Coefficient</th>
                        <th>Notes x Coefficient</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
                <tfoot>
                    <tr class="total-row">
                        <td colspan="2"><strong>TOTAL</strong></td>
                        <td id="totalCoef">0</td>
                        <td id="totalNotesCoef">0</td>
                    </tr>
                    <tr class="moyenne-row">
                        <td colspan="3"><strong>MOYENNE</strong></td>
                        <td id="moyenne">0.00</td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <div class="actions">
            <button class="btn-calculate" onclick="calculerMoyenne()">CALCULER LA MOYENNE</button>
            <button class="btn-reset" onclick="reinitialiser()">REINITIALISER</button>
        </div>

        <div class="resultats" id="resultats">
            <div class="result-card">
                <h3>Somme ponderee</h3>
                <span id="sommePonderee">0</span>
            </div>
            <div class="result-card">
                <h3>Total coefficients</h3>
                <span id="totalCoefficients">0</span>
            </div>
            <div class="result-card highlight">
                <h3>Moyenne finale</h3>
                <span id="moyenneFinale">0.00</span>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p class="footer-name">YANN</p>
            <p class="footer-text">Average Calculator - Tous droits reservés</p>
            <p class="footer-year">2026</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
